[server]
host = "0.0.0.0"
port = 8080
# api_key = "secret-token"

[docker]
# socket = "/var/run/docker.sock"
# network = "den-net"

[pool]
replenish_interval_secs = 5

[reaper]
interval_secs = 10
idle_timeout_secs = 300

[tiers.default]
image = "den-sandbox:latest"
memory_mb = 1024
cpus = 1.0
pids = 256
timeout_secs = 86400
pool_size = 2
readonly_rootfs = false

[tiers.default.tmpfs]
"/tmp" = "size=200M,mode=1777"
